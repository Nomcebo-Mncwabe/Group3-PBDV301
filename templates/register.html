<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>DUT SafeAlert - Register</header>

    <div class="container">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-message">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <h2>Create an Account</h2>

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" required>
                    <option value="">--Select Role--</option>
                    <option value="Student">Student</option>
                    <option value="Lecturer">Lecturer</option>
                    <option value="Security Officer">Security Officer</option>
                    <option value="Head of Security">Head of Security</option>
                </select>
            </div>
            <input type="submit" value="Register" class="btn">
        </form>

        <div style="margin-top:20px; text-align:center;">
            <a href="{{ url_for('home') }}" class="btn">Back to Home</a>
            <a href="{{ url_for('select_role') }}" class="btn">Already have an account? Login</a>
        </div>
    </div>

    <footer>&copy; 2026 Durban University of Technology</footer>
</body>
</html>
