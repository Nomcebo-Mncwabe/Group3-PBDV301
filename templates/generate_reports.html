<!DOCTYPE html>
<html>
<head>
    <title>Incident Reports</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        .charts-grid{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(400px,1fr));
            gap:25px;
            margin-top:30px;
        }

        .chart-container{
            background:#f9f9f9;
            padding:20px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.1);
            text-align:center;
        }

        canvas{
            width:100% !important;
            height:280px !important;
        }

        header{
            background:#222;
            color:white;
            padding:15px;
            text-align:center;
            font-size:20px;
        }

        .container{
            width:90%;
            margin:auto;
        }

        h2{
            text-align:center;
        }

    </style>
</head>

<body>

<header>DUT SafeAlert - Incident Reports</header>

<div class="container">

<h2>Incident Trends Dashboard</h2>

<div class="charts-grid">

    <div class="chart-container">
        <h3>Incidents by Campus</h3>
        <canvas id="campusChart"></canvas>
    </div>

    <div class="chart-container">
        <h3>Incidents by Category</h3>
        <canvas id="categoryChart"></canvas>
    </div>

    <div class="chart-container">
        <h3>Incidents by Severity</h3>
        <canvas id="severityChart"></canvas>
    </div>

    <div class="chart-container">
        <h3>Incidents by Status</h3>
        <canvas id="statusChart"></canvas>
    </div>

</div>

<div style="margin-top:30px;text-align:center;">
    <a href="{{ url_for('head_dashboard') }}">
        <button>Back to Dashboard</button>
    </a>
</div>

</div>


<script>

const campusCtx = document.getElementById('campusChart');

new Chart(campusCtx,{
    type:'bar',
    data:{
        labels: {{ campus_counts.keys()|list|tojson }},
        datasets:[{
            label:'Incidents',
            data: {{ campus_counts.values()|list|tojson }},
            backgroundColor:'rgba(54,162,235,0.6)'
        }]
    }
});


const categoryCtx = document.getElementById('categoryChart');

new Chart(categoryCtx,{
    type:'pie',
    data:{
        labels: {{ category_counts.keys()|list|tojson }},
        datasets:[{
            data: {{ category_counts.values()|list|tojson }},
            backgroundColor:[
                '#ff6384',
                '#36a2eb',
                '#ffce56',
                '#4bc0c0',
                '#9966ff'
            ]
        }]
    }
});


const severityCtx = document.getElementById('severityChart');

new Chart(severityCtx,{
    type:'doughnut',
    data:{
        labels: {{ severity_counts.keys()|list|tojson }},
        datasets:[{
            data: {{ severity_counts.values()|list|tojson }},
            backgroundColor:[
                '#ff4d4d',
                '#ff944d',
                '#ffd11a',
                '#4dff88'
            ]
        }]
    }
});

    const statusCtx = document.getElementById('statusChart');

new Chart(statusCtx,{
    type:'doughnut',
    data:{
        labels:["Pending","In Progress","Resolved"],
        datasets:[{
            data:[
                {{ status_counts["Pending"] }},
                {{ status_counts["In Progress"] }},
                {{ status_counts["Resolved"] }}
            ],
            backgroundColor:[
                '#ffcc00',  // Pending
                '#3399ff',  // In Progress
                '#33cc66'   // Resolved
            ]
        }]
    },
    options:{
        plugins:{
            legend:{
                position:'bottom'
            }
        }
    }
});

</script>

</body>
</html>
