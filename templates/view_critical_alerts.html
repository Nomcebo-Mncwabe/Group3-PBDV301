<!-- ONLY REPLACE ALERT CARD LOOP -->

{% for alert in alerts %}
<div class="alert-card {% if alert.status == 'resolved' %}resolved{% else %}ongoing{% endif %}">

<div class="alert-header">
<div class="alert-indicator"></div>
<span class="alert-tag">Critical Alert</span>
</div>

<div class="alert-message">{{ alert.message }}</div>

{% if alert.incident %}
<div class="alert-incident">
{{ alert.incident.title }} — {{ alert.incident.location }}
</div>
{% endif %}

<div class="alert-timestamp">
{{ alert.timestamp.strftime("%d %b %Y at %H:%M") }}
</div>

</div>
{% endfor %}
